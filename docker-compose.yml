# Despliegue manual en el VPS: solo Caddy sirviendo la PWA con HTTPS.
#
# TRAS LA MIGRACIÓN A SUPABASE (Fase 7) ya no hay backend propio ni Postgres
# local: la capa de datos (Postgres + Auth + Realtime + Storage) vive en
# Supabase, accedida desde el frontend vía supabase-js. Este compose queda
# solo como receta alternativa manual para servir los estáticos de la PWA.
# En producción real la app corre en Dokploy (ver CLAUDE.md).
#
# Uso:
#   1) cp .env.deploy.example .env  y edita los valores
#   2) docker compose up -d --build

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Vite hornea las VITE_* en tiempo de build.
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY:-}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?define DOMAIN en .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  caddydata:
  caddyconfig:
